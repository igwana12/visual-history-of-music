<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
}
body {
  min-height: 100dvh;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.6;
  overflow: hidden;
}

/* ===== CUSTOM PROPERTIES ===== */
:root {
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  
  --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.8rem);
  --text-sm: clamp(0.8rem, 0.75rem + 0.25vw, 0.875rem);
  --text-base: clamp(0.875rem, 0.85rem + 0.15vw, 1rem);
  --text-lg: clamp(1.05rem, 1rem + 0.3vw, 1.25rem);
  --text-xl: clamp(1.25rem, 1.1rem + 0.75vw, 1.75rem);
  --text-2xl: clamp(1.75rem, 1.2rem + 2vw, 2.75rem);
  
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --transition-fast: 180ms var(--ease-out);
  --transition-med: 350ms var(--ease-out);
  --transition-slow: 600ms var(--ease-out);
  
  /* Genre Colors */
  --color-blues: #4a90d9;
  --color-jazz: #d4a843;
  --color-country: #c17a3a;
  --color-rock: #d94452;
  --color-soul: #3ab5a5;
  --color-electronic: #5dd477;
  --color-hiphop: #9b59b6;
  --color-pop: #e87ecf;
  --color-punk: #e8a62e;
  --color-metal: #8c8c8c;
}

/* ===== DARK THEME (default) ===== */
[data-theme="dark"] {
  --color-bg: #0a0a0f;
  --color-bg-elevated: #10101a;
  --color-surface: #151520;
  --color-surface-2: #1a1a2a;
  --color-surface-3: #222235;
  --color-border: rgba(255,255,255,0.08);
  --color-border-hover: rgba(255,255,255,0.15);
  --color-text: #e8e6e1;
  --color-text-muted: #8a8890;
  --color-text-faint: #55535a;
  --color-overlay: rgba(5,5,10,0.85);
  --color-glow: rgba(100,120,255,0.06);
  --shadow-card: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.7);
}

/* ===== LIGHT THEME ===== */
[data-theme="light"] {
  --color-bg: #f5f3ee;
  --color-bg-elevated: #ffffff;
  --color-surface: #ffffff;
  --color-surface-2: #f8f7f4;
  --color-surface-3: #eeecea;
  --color-border: rgba(0,0,0,0.1);
  --color-border-hover: rgba(0,0,0,0.2);
  --color-text: #1a1a20;
  --color-text-muted: #6a6870;
  --color-text-faint: #a0a0a8;
  --color-overlay: rgba(245,243,238,0.9);
  --color-glow: rgba(100,120,255,0.04);
  --shadow-card: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --color-blues: #2a6ab8;
  --color-jazz: #b08830;
  --color-country: #a86528;
  --color-rock: #c03040;
  --color-soul: #258a7d;
  --color-electronic: #3aaa52;
  --color-hiphop: #7a3a9a;
  --color-pop: #c05aa0;
  --color-punk: #c08820;
  --color-metal: #606060;
}

body {
  background: var(--color-bg);
  color: var(--color-text);
}

/* ===== TOP BAR ===== */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1.2rem;
  background: var(--color-bg-elevated);
  border-bottom: 1px solid var(--color-border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  gap: 0.75rem;
}
.top-bar-left {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}
.logo-mark { flex-shrink: 0; }
.logo-text {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--color-text);
  white-space: nowrap;
}
.logo-subtitle {
  display: none;
  font-family: var(--font-body);
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  font-weight: 400;
}
@media (min-width: 768px) {
  .logo-subtitle { display: block; }
}

/* Search */
.search-container {
  position: relative;
  flex: 0 1 280px;
  min-width: 120px;
}
.search-input {
  width: 100%;
  padding: 0.4rem 0.4rem 0.4rem 2rem;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 6px;
  color: var(--color-text);
  font-size: var(--text-sm);
  font-family: var(--font-body);
  outline: none;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.search-input::placeholder { color: var(--color-text-faint); }
.search-input:focus {
  border-color: var(--color-border-hover);
  box-shadow: 0 0 0 3px var(--color-glow);
}
.search-icon {
  position: absolute;
  left: 0.6rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-faint);
  pointer-events: none;
}

/* Genre Filters */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  overflow-x: auto;
  flex-shrink: 1;
  min-width: 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.genre-pill {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.25rem 0.55rem;
  border-radius: 100px;
  font-size: var(--text-xs);
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  border: 1px solid var(--color-border);
  background: transparent;
  color: var(--color-text-muted);
  transition: all var(--transition-fast);
  user-select: none;
}
.genre-pill .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.genre-pill.active {
  background: var(--color-surface-2);
  color: var(--color-text);
  border-color: var(--color-border-hover);
}
.genre-pill:hover {
  background: var(--color-surface-2);
  color: var(--color-text);
}

/* Top-bar right */
.top-bar-right {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
}
.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: 6px;
  border: 1px solid var(--color-border);
  background: transparent;
  color: var(--color-text-muted);
  cursor: pointer;
  transition: all var(--transition-fast);
}
.icon-btn:hover {
  background: var(--color-surface-2);
  color: var(--color-text);
  border-color: var(--color-border-hover);
}
.count-badge {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  white-space: nowrap;
}

/* ===== DECADE NAV ===== */
.decade-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0.5rem 1rem;
  background: var(--color-bg-elevated);
  border-top: 1px solid var(--color-border);
}
.decade-btn {
  padding: 0.3rem 0.6rem;
  font-size: var(--text-xs);
  font-weight: 500;
  font-family: var(--font-body);
  font-variant-numeric: tabular-nums;
  color: var(--color-text-faint);
  background: transparent;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
}
.decade-btn:hover, .decade-btn.active {
  color: var(--color-text);
  background: var(--color-surface-2);
}
.decade-btn.active {
  font-weight: 600;
}

/* ===== MAIN CANVAS ===== */
.main-canvas {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  padding-top: 52px;
  padding-bottom: 40px;
  overflow: hidden;
}
.scroll-container {
  width: 100%;
  height: 100%;
  overflow-x: auto;
  overflow-y: hidden;
  cursor: grab;
  scrollbar-width: thin;
  scrollbar-color: var(--color-surface-3) transparent;
}
.scroll-container:active { cursor: grabbing; }
.scroll-container::-webkit-scrollbar { height: 6px; }
.scroll-container::-webkit-scrollbar-track { background: transparent; }
.scroll-container::-webkit-scrollbar-thumb {
  background: var(--color-surface-3);
  border-radius: 3px;
}

#terrain-svg {
  display: block;
  min-width: 100%;
}

/* SVG Styling */
.genre-area {
  transition: opacity var(--transition-med);
}
.genre-area.dimmed { opacity: 0.12; }

/* Node styling */
.node-group { cursor: pointer; }
.node-pulse {
  animation: pulse 4s ease-in-out infinite;
  transform-origin: center;
  transform-box: fill-box;
}
@keyframes pulse {
  0%, 100% { opacity: 0.25; r: 7; }
  50% { opacity: 0; r: 16; }
}
.node-dot {
  transition: r var(--transition-fast), filter var(--transition-fast);
}
.node-group:hover .node-dot {
  filter: brightness(1.3) drop-shadow(0 0 6px currentColor);
}
.node-group.dimmed { opacity: 0.1; pointer-events: none; }
.node-group.highlighted .node-dot {
  filter: brightness(1.4) drop-shadow(0 0 10px currentColor);
}

/* Year labels on terrain */
.year-label {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  fill: var(--color-text-faint);
  user-select: none;
}
.decade-line {
  stroke: var(--color-border);
  stroke-dasharray: 3,5;
}

/* Node labels */
.node-label {
  font-family: var(--font-body);
  font-weight: 500;
  fill: var(--color-text);
  pointer-events: none;
  user-select: none;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
[data-theme="light"] .node-label {
  text-shadow: 0 1px 3px rgba(255,255,255,0.9);
}

/* Genre legend in terrain */
.genre-legend-label {
  font-family: var(--font-display);
  font-weight: 400;
  font-style: italic;
  user-select: none;
  pointer-events: none;
}

/* ===== CONTENT CARD (Side Panel) ===== */
.card-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 200;
  background: var(--color-overlay);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-med);
}
.card-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.content-card {
  position: fixed;
  z-index: 210;
  top: 52px;
  right: -480px;
  width: 440px;
  max-width: calc(100vw - 20px);
  bottom: 40px;
  background: var(--color-surface);
  border-left: 1px solid var(--color-border);
  box-shadow: var(--shadow-lg);
  overflow-y: auto;
  transition: right var(--transition-slow);
  scrollbar-width: thin;
  scrollbar-color: var(--color-surface-3) transparent;
}
.content-card.visible { right: 0; }

@media (max-width: 600px) {
  .content-card {
    top: auto;
    right: 0;
    bottom: -100%;
    left: 0;
    width: 100%;
    max-width: 100%;
    max-height: 85vh;
    border-left: none;
    border-top: 1px solid var(--color-border);
    border-radius: 16px 16px 0 0;
    transition: bottom var(--transition-slow);
  }
  .content-card.visible { bottom: 0; }
  
  .top-bar {
    padding: 0.4rem 0.6rem;
    gap: 0.4rem;
  }
  .logo-text { font-size: var(--text-base); }
  .search-container { flex: 0 1 100px; min-width: 80px; }
  .search-input { padding: 0.3rem 0.3rem 0.3rem 1.8rem; font-size: 12px; }
  .filter-bar { max-width: 120px; }
  .genre-pill { padding: 0.2rem 0.4rem; font-size: 10px; }
  .decade-nav { padding: 0.35rem 0.5rem; gap: 0; }
  .decade-btn { padding: 0.25rem 0.4rem; font-size: 10px; }
  .count-badge { font-size: 10px; }
}

.card-close {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0.75rem 1rem;
  background: var(--color-surface);
}
.card-close button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--color-border);
  background: var(--color-surface-2);
  color: var(--color-text-muted);
  cursor: pointer;
  transition: all var(--transition-fast);
}
.card-close button:hover {
  background: var(--color-surface-3);
  color: var(--color-text);
}

.card-body { padding: 0 1.5rem 2rem; }

.card-genre-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2rem 0.6rem;
  border-radius: 100px;
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
}
.card-genre-tag .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}

.card-year {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.25rem;
}
.card-title {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.15rem;
  color: var(--color-text);
}
.card-artist {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 400;
  font-style: italic;
  color: var(--color-text-muted);
  margin-bottom: 1.25rem;
}

/* YouTube Embed */
.video-wrapper {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  margin-bottom: 1.25rem;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}
.video-wrapper iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}

.card-context {
  font-size: var(--text-sm);
  line-height: 1.7;
  color: var(--color-text-muted);
  margin-bottom: 1.25rem;
}

.card-influences {
  padding-top: 1rem;
  border-top: 1px solid var(--color-border);
}
.card-influences-label {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-text-faint);
  margin-bottom: 0.5rem;
}
.influence-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
}
.influence-tag {
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-size: var(--text-xs);
  background: var(--color-surface-2);
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
}

/* ===== INTRO OVERLAY ===== */
.intro-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--color-bg);
  transition: opacity 1s ease, visibility 1s ease;
}
.intro-overlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.intro-logo {
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: introFadeUp 1s 0.2s forwards;
}
.intro-title {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: 700;
  text-align: center;
  margin-bottom: 0.5rem;
  opacity: 0;
  animation: introFadeUp 1s 0.5s forwards;
}
.intro-sub {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text-muted);
  text-align: center;
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: introFadeUp 1s 0.8s forwards;
}
.intro-enter {
  padding: 0.7rem 2.5rem;
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-bg);
  background: var(--color-text);
  border: none;
  border-radius: 100px;
  cursor: pointer;
  opacity: 0;
  animation: introFadeUp 1s 1.1s forwards;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}
.intro-enter:hover {
  transform: scale(1.04);
  box-shadow: 0 4px 20px rgba(255,255,255,0.15);
}
@keyframes introFadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== TOOLTIP ===== */
.node-tooltip {
  position: fixed;
  z-index: 150;
  padding: 0.4rem 0.7rem;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 6px;
  box-shadow: var(--shadow-card);
  pointer-events: none;
  opacity: 0;
  transition: opacity 150ms;
  font-size: var(--text-xs);
  max-width: 220px;
}
.node-tooltip.visible { opacity: 1; }
.tooltip-title { font-weight: 600; color: var(--color-text); }
.tooltip-artist { color: var(--color-text-muted); }
.tooltip-year { color: var(--color-text-faint); font-variant-numeric: tabular-nums; }

/* ===== FOOTER ===== */
.footer-attr {
  position: fixed;
  bottom: 44px;
  right: 12px;
  z-index: 90;
  font-size: 10px;
  color: var(--color-text-faint);
  opacity: 0.5;
}
.footer-attr a {
  color: inherit;
  text-decoration: none;
}
.footer-attr a:hover { text-decoration: underline; }

/* ===== EDGE FADE ===== */
.scroll-container::before,
.scroll-container::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 60px;
  z-index: 10;
  pointer-events: none;
}
.scroll-container::before {
  left: 0;
  background: linear-gradient(to right, var(--color-bg), transparent);
}
.scroll-container::after {
  right: 0;
  background: linear-gradient(to left, var(--color-bg), transparent);
}
.scroll-container { position: relative; }

/* ===== SCROLLBAR AREA ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== LOADING STATE ===== */
.loading-text {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-text-faint);
  text-align: center;
  padding: 2rem;
}

/* SVG filter for watercolor effect */
.watercolor-filter { filter: url(#watercolor); }
</style>
</head>
<body>

<!-- INTRO OVERLAY -->
<div class="intro-overlay" id="intro">
  <div class="intro-logo">
    <svg width="80" height="80" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="VHM Logo">
      <!-- Sound wave / tree hybrid mark -->
      <circle cx="60" cy="60" r="58" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
      <circle cx="60" cy="60" r="42" stroke="currentColor" stroke-width="1" opacity="0.1"/>
      <!-- Central waveform trunk -->
      <path d="M60 95 L60 55" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Wave branches -->
      <path d="M60 55 Q45 45 35 30" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M60 55 Q75 45 85 30" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M60 65 Q42 58 30 50" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>

// ===== APP STATE =====
let activeGenres = new Set(GENRES.map(g => g.id));
let searchQuery = '';
let selectedPerformance = null;
let currentTheme = 'dark';

// ===== DIMENSIONS =====
const CHART_CONFIG = {
  width: 5000,
  height: 0, // computed
  marginTop: 60,
  marginBottom: 90,
  marginLeft: 40,
  marginRight: 60,
  nodeRadius: 5.5,
  yearStart: 1918,
  yearEnd: 2026,
};

function getChartHeight() {
  return Math.max(window.innerHeight - 92, 400);
}

// ===== INITIALIZATION =====
document.addEventListener('DOMContentLoaded', () => {
  CHART_CONFIG.height = getChartHeight();
  
  // Intro
  document.getElementById('enter-btn').addEventListener('click', () => {
    document.getElementById('intro').classList.add('hidden');
    setTimeout(() => initVisualization(), 300);
  });
  
  // Theme toggle
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  
  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    searchQuery = e.target.value.toLowerCase();
    updateNodes();
  });
  
  // Card close
  document.getElementById('card-close-btn').addEventListener('click', closeCard);
  document.getElementById('card-overlay').addEventListener('click', closeCard);
  
  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeCard();
  });
  
  // Build genre filters
  buildFilters();
  buildDecadeNav();
  
  // Resize
  window.addEventListener('resize', debounce(() => {
    CHART_CONFIG.height = getChartHeight();
    renderTerrain();
  }, 250));
  
  // Drag scroll
  initDragScroll();
});

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  const btn = document.getElementById('theme-toggle');
  btn.innerHTML = currentTheme === 'dark'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}

function buildFilters() {
  const container = document.getElementById('filters');
  GENRES.forEach(g => {
    const pill = document.createElement('button');
    pill.className = 'genre-pill active';
    pill.dataset.genre = g.id;
    pill.innerHTML = `<span class="dot" style="background:${g.hex}"></span>${g.name}`;
    pill.addEventListener('click', () => toggleGenre(g.id, pill));
    container.appendChild(pill);
  });
}

function toggleGenre(id, pill) {
  if (activeGenres.has(id)) {
    activeGenres.delete(id);
    pill.classList.remove('active');
  } else {
    activeGenres.add(id);
    pill.classList.add('active');
  }
  updateTerrain();
  updateNodes();
}

function buildDecadeNav() {
  const nav = document.getElementById('decade-nav');
  DECADES.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'decade-btn';
    btn.textContent = d + 's';
    btn.addEventListener('click', () => scrollToDecade(d));
    nav.appendChild(btn);
  });
}

function scrollToDecade(decade) {
  const container = document.getElementById('scroll-container');
  const x = xScale(decade) - window.innerWidth / 3;
  container.scrollTo({ left: Math.max(0, x), behavior: 'smooth' });
  
  // Update active state
  document.querySelectorAll('.decade-btn').forEach((btn, i) => {
    btn.classList.toggle('active', DECADES[i] === decade);
  });
}

// ===== DRAG SCROLL =====
function initDragScroll() {
  const el = document.getElementById('scroll-container');
  let isDragging = false;
  let startX, scrollLeft;
  
  el.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node-group')) return;
    isDragging = true;
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
    el.style.cursor = 'grabbing';
  });
  el.addEventListener('mouseleave', () => { isDragging = false; el.style.cursor = 'grab'; });
  el.addEventListener('mouseup', () => { isDragging = false; el.style.cursor = 'grab'; });
  el.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollLeft - (x - startX);
  });
  
  // Mouse wheel → horizontal scroll
  el.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return; // natural horizontal
    e.preventDefault();
    el.scrollLeft += e.deltaY * 2;
  }, { passive: false });
}

// ===== SCALES =====
let xScale, yScale;

function initScales() {
  const { width, height, marginTop, marginBottom, marginLeft, marginRight, yearStart, yearEnd } = CHART_CONFIG;
  xScale = d3.scaleLinear().domain([yearStart, yearEnd]).range([marginLeft, width - marginRight]);
  yScale = d3.scaleLinear().domain([0, 1.6]).range([height - marginBottom, marginTop]);
}

// ===== TERRAIN RENDERING =====
function initVisualization() {
  initScales();
  renderTerrain();
  updateCountBadge();
  
  // Scroll to 1950s on load
  setTimeout(() => scrollToDecade(1950), 500);
}

function renderTerrain() {
  initScales();
  const { width, height, marginTop, marginBottom } = CHART_CONFIG;
  const svg = d3.select('#terrain-svg')
    .attr('width', width)
    .attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);
  
  svg.selectAll('*').remove();
  
  // Defs: filters and gradients
  const defs = svg.append('defs');
  
  // Watercolor turbulence filter
  const filter = defs.append('filter').attr('id', 'watercolor').attr('x', '-5%').attr('y', '-5%').attr('width', '110%').attr('height', '110%');
  filter.append('feTurbulence').attr('type', 'fractalNoise').attr('baseFrequency', '0.015').attr('numOctaves', '3').attr('seed', '2').attr('result', 'noise');
  filter.append('feDisplacementMap').attr('in', 'SourceGraphic').attr('in2', 'noise').attr('scale', '8').attr('xChannelSelector', 'R').attr('yChannelSelector', 'G');
  
  // Glow filter for nodes
  const glow = defs.append('filter').attr('id', 'glow');
  glow.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
  const merge = glow.append('feMerge');
  merge.append('feMergeNode').attr('in', 'blur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');
  
  // Genre gradients
  GENRES.forEach(g => {
    const grad = defs.append('linearGradient').attr('id', `grad-${g.id}`).attr('x1', '0').attr('y1', '0').attr('x2', '0').attr('y2', '1');
    grad.append('stop').attr('offset', '0%').attr('stop-color', g.hex).attr('stop-opacity', 0.7);
    grad.append('stop').attr('offset', '100%').attr('stop-color', g.hex).attr('stop-opacity', 0.15);
  });
  
  // Subtle background texture - star field for nocturnal feel
  const bgGroup = svg.append('g').attr('class', 'bg-stars');
  for (let i = 0; i < 120; i++) {
    bgGroup.append('circle')
      .attr('cx', Math.random() * width)
      .attr('cy', marginTop + Math.random() * (height - marginTop - marginBottom))
      .attr('r', Math.random() * 1.2 + 0.2)
      .attr('fill', 'currentColor')
      .attr('opacity', Math.random() * 0.08 + 0.02);
  }
  
  // Background grid/decade lines
  const gridGroup = svg.append('g').attr('class', 'grid');
  DECADES.forEach(d => {
    const x = xScale(d);
    gridGroup.append('line')
      .attr('class', 'decade-line')
      .attr('x1', x).attr('y1', marginTop - 10)
      .attr('x2', x).attr('y2', height - marginBottom + 20);
    gridGroup.append('text')
      .attr('class', 'year-label')
      .attr('x', x).attr('y', height - marginBottom + 40)
      .attr('text-anchor', 'middle')
      .text(d + 's');
  });
  
  // Stacked area terrain
  renderStackedArea(svg);
  
  // Performance nodes
  renderNodes(svg);
}

function renderStackedArea(svg) {
  const { marginLeft, marginRight, width } = CHART_CONFIG;
  const genreIds = GENRES.map(g => g.id);
  
  // Build stacked data
  const stackData = DECADES.map((decade, i) => {
    const row = { year: decade };
    genreIds.forEach(id => {
      row[id] = GENRE_PROMINENCE[id][i];
    });
    return row;
  });
  
  // Also add interpolated mid-decade points for smoother curves
  const smoothData = [];
  for (let i = 0; i < stackData.length; i++) {
    smoothData.push(stackData[i]);
    if (i < stackData.length - 1) {
      const mid = { year: stackData[i].year + 5 };
      genreIds.forEach(id => {
        mid[id] = (stackData[i][id] + stackData[i + 1][id]) / 2 + (Math.random() - 0.5) * 0.02;
      });
      smoothData.push(mid);
    }
  }
  
  const stack = d3.stack()
    .keys(genreIds)
    .order(d3.stackOrderNone)
    .offset(d3.stackOffsetWiggle);
  
  const series = stack(smoothData);
  
  // Normalize y extent
  const yExtent = [d3.min(series, s => d3.min(s, d => d[0])), d3.max(series, s => d3.max(s, d => d[1]))];
  yScale.domain(yExtent);
  
  const area = d3.area()
    .x(d => xScale(d.data.year))
    .y0(d => yScale(d[0]))
    .y1(d => yScale(d[1]))
    .curve(d3.curveBasis);
  
  const terrainGroup = svg.append('g').attr('class', 'terrain');
  
  series.forEach((s, i) => {
    const genre = GENRES[i];
    terrainGroup.append('path')
      .datum(s)
      .attr('class', `genre-area genre-area-${genre.id}`)
      .attr('d', area)
      .attr('fill', `url(#grad-${genre.id})`)
      .attr('stroke', genre.hex)
      .attr('stroke-width', 0.5)
      .attr('stroke-opacity', 0.3)
      .style('filter', 'url(#watercolor)');
    
    // Genre label positioned at peak
    const peakIdx = GENRE_PROMINENCE[genre.id].indexOf(Math.max(...GENRE_PROMINENCE[genre.id]));
    const peakDecade = DECADES[peakIdx];
    const midPoint = s.find(d => d.data.year === peakDecade) || s[Math.floor(s.length / 2)];
    if (midPoint) {
      const labelY = yScale((midPoint[0] + midPoint[1]) / 2);
      terrainGroup.append('text')
        .attr('class', 'genre-legend-label')
        .attr('x', xScale(peakDecade))
        .attr('y', labelY)
        .attr('text-anchor', 'middle')
        .attr('fill', genre.hex)
        .attr('font-size', 13)
        .attr('opacity', 0.5)
        .text(genre.name);
    }
  });
  
  // Store series for node positioning
  window._series = series;
  window._smoothData = smoothData;
}

function getGenreY(genre, year) {
  // Find the Y position within a genre's band for a given year
  const genreIdx = GENRES.findIndex(g => g.id === genre);
  if (genreIdx < 0 || !window._series) return CHART_CONFIG.height / 2;
  
  const s = window._series[genreIdx];
  // Interpolate between data points
  const smoothData = window._smoothData;
  
  for (let i = 0; i < s.length - 1; i++) {
    if (year >= smoothData[i].year && year <= smoothData[i + 1].year) {
      const t = (year - smoothData[i].year) / (smoothData[i + 1].year - smoothData[i].year);
      const y0 = s[i][0] + t * (s[i + 1][0] - s[i][0]);
      const y1 = s[i][1] + t * (s[i + 1][1] - s[i][1]);
      return yScale((y0 + y1) / 2);
    }
  }
  
  const last = s[s.length - 1];
  return yScale((last[0] + last[1]) / 2);
}

function renderNodes(svg) {
  const { nodeRadius } = CHART_CONFIG;
  const nodesGroup = svg.append('g').attr('class', 'nodes');
  
  // Add slight vertical jitter to avoid overlaps
  const positions = [];
  
  PERFORMANCES.forEach((perf, idx) => {
    const x = xScale(perf.year);
    let y = getGenreY(perf.genre, perf.year);
    
    // Jitter to avoid overlap
    const jitterAttempts = 10;
    for (let a = 0; a < jitterAttempts; a++) {
      const collision = positions.some(p => Math.abs(p.x - x) < 20 && Math.abs(p.y - y) < 16);
      if (!collision) break;
      y += (a % 2 === 0 ? 1 : -1) * (8 + a * 4);
    }
    positions.push({ x, y });
    perf._x = x;
    perf._y = y;
    
    const genre = GENRES.find(g => g.id === perf.genre);
    const group = nodesGroup.append('g')
      .attr('class', 'node-group')
      .attr('data-idx', idx)
      .attr('data-genre', perf.genre)
      .attr('transform', `translate(${x},${y})`);
    
    // Pulse ring (using SVG animate)
    const pulseCircle = group.append('circle')
      .attr('r', nodeRadius + 2)
      .attr('fill', 'none')
      .attr('stroke', genre.hex)
      .attr('stroke-width', 1)
      .attr('opacity', 0.3);
    
    // SVG SMIL animation for reliable pulsing
    pulseCircle.append('animate')
      .attr('attributeName', 'r')
      .attr('values', `${nodeRadius + 2};${nodeRadius + 12};${nodeRadius + 2}`)
      .attr('dur', `${3 + Math.random() * 2}s`)
      .attr('repeatCount', 'indefinite');
    pulseCircle.append('animate')
      .attr('attributeName', 'opacity')
      .attr('values', '0.3;0;0.3')
      .attr('dur', `${3 + Math.random() * 2}s`)
      .attr('repeatCount', 'indefinite');
    
    // Main dot
    group.append('circle')
      .attr('class', 'node-dot')
      .attr('r', nodeRadius)
      .attr('fill', genre.hex)
      .attr('stroke', '#fff')
      .attr('stroke-width', 1.2)
      .attr('stroke-opacity', 0.3)
      .style('color', genre.hex);
    
    // Label (artist name) — show only for some nodes to avoid clutter
    if (idx % 2 === 0 || PERFORMANCES.length < 50) {
      group.append('text')
        .attr('class', 'node-label')
        .attr('x', 0)
        .attr('y', -nodeRadius - 6)
        .attr('text-anchor', 'middle')
        .attr('font-size', '9px')
        .text(perf.artist.length > 18 ? perf.artist.slice(0, 16) + '…' : perf.artist);
    }
    
    // Interactions
    group.on('click', (e) => {
      e.stopPropagation();
      openCard(perf);
    });
    
    group.on('mouseenter', (e) => showTooltip(e, perf));
    group.on('mouseleave', hideTooltip);
  });
}

function updateTerrain() {
  GENRES.forEach(g => {
    const dimmed = !activeGenres.has(g.id);
    d3.selectAll(`.genre-area-${g.id}`).classed('dimmed', dimmed);
  });
}

function updateNodes() {
  const filtered = getFilteredPerformances();
  const filteredSet = new Set(filtered.map((_, i) => PERFORMANCES.indexOf(_)));
  
  d3.selectAll('.node-group').each(function() {
    const idx = +this.getAttribute('data-idx');
    const isVisible = filteredSet.has(idx);
    d3.select(this).classed('dimmed', !isVisible);
    
    // Highlight search matches
    if (searchQuery && isVisible) {
      d3.select(this).classed('highlighted', true);
    } else {
      d3.select(this).classed('highlighted', false);
    }
  });
  
  updateCountBadge();
}

function getFilteredPerformances() {
  return PERFORMANCES.filter(p => {
    if (!activeGenres.has(p.genre)) return false;
    if (searchQuery) {
      const q = searchQuery;
      return p.artist.toLowerCase().includes(q) ||
             p.song.toLowerCase().includes(q) ||
             p.genre.toLowerCase().includes(q) ||
             p.context.toLowerCase().includes(q);
    }
    return true;
  });
}

function updateCountBadge() {
  const count = getFilteredPerformances().length;
  document.getElementById('count-badge').textContent = `${count}/${PERFORMANCES.length}`;
}

// ===== TOOLTIP =====
function showTooltip(event, perf) {
  const tooltip = document.getElementById('tooltip');
  document.getElementById('tooltip-title').textContent = perf.song;
  document.getElementById('tooltip-artist').textContent = perf.artist;
  document.getElementById('tooltip-year').textContent = perf.year;
  
  tooltip.style.left = (event.clientX + 12) + 'px';
  tooltip.style.top = (event.clientY - 10) + 'px';
  tooltip.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// ===== CONTENT CARD =====
function openCard(perf) {
  selectedPerformance = perf;
  const genre = GENRES.find(g => g.id === perf.genre);
  
  const body = document.getElementById('card-body');
  body.innerHTML = `
    <div class="card-genre-tag" style="background:${genre.hex}22;color:${genre.hex};border:1px solid ${genre.hex}33">
      <span class="dot" style="background:${genre.hex}"></span>
      ${genre.name}
    </div>
    <div class="card-year">${perf.year}</div>
    <h2 class="card-title">${perf.song}</h2>
    <div class="card-artist">${perf.artist}</div>
    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/${perf.videoId}?rel=0&modestbranding=1" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen loading="lazy" title="${perf.artist} - ${perf.song}"></iframe>
    </div>
    <p class="card-context">${perf.context}</p>
    <div class="card-influences">
      <div class="card-influences-label">Influenced</div>
      <div class="influence-tags">
        ${perf.influences.map(tag => `<span class="influence-tag">${tag}</span>`).join('')}
      </div>
    </div>
  `;
  
  document.getElementById('card-overlay').classList.add('visible');
  document.getElementById('content-card').classList.add('visible');
}

function closeCard() {
  document.getElementById('card-overlay').classList.remove('visible');
  document.getElementById('content-card').classList.remove('visible');
  
  // Stop YouTube playback
  setTimeout(() => {
    const iframe = document.querySelector('.video-wrapper iframe');
    if (iframe) iframe.src = '';
  }, 400);
  
  selectedPerformance = null;
}

// ===== UTILS =====
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}
</script>
