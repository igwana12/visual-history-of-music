<style>
/* ===== Selection Screen ===== */
.selection-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--space-8) var(--space-4);
}

.selection-screen__title {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  color: var(--text-primary);
  text-align: center;
  margin-bottom: var(--space-2);
}

.selection-screen__subtitle {
  font-size: var(--text-md);
  color: var(--text-muted);
  text-align: center;
  max-width: 540px;
  margin-bottom: var(--space-6);
}

/* Selected preview strip */
.selection-preview {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  margin-bottom: var(--space-8);
  min-height: 64px;
}

.selection-slot {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-5);
  background: var(--bg-surface);
  border: 2px dashed var(--border-medium);
  border-radius: var(--radius-lg);
  min-width: 200px;
  min-height: 56px;
  transition: all var(--transition-base);
}

.selection-slot--filled {
  border-style: solid;
  border-color: var(--border-strong);
}

.selection-slot__avatar {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--text-sm);
  color: var(--bg-root);
}

.selection-slot__name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--text-base);
}

.selection-slot__placeholder {
  color: var(--text-dim);
  font-size: var(--text-sm);
}

.selection-vs {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  color: var(--text-dim);
  font-weight: 700;
  font-style: italic;
}

.compare-btn {
  padding: var(--space-3) var(--space-8);
  font-family: var(--font-body);
  font-size: var(--text-md);
  font-weight: 600;
  background: var(--genre-rock);
  color: white;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
  opacity: 0.4;
  pointer-events: none;
  margin-bottom: var(--space-8);
}

.compare-btn--active {
  opacity: 1;
  pointer-events: auto;
}

.compare-btn--active:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(217, 68, 82, 0.4);
}

.compare-btn--active:active {
  transform: translateY(0);
}

/* Artist selection grid */
.select-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: var(--space-3);
  width: 100%;
  max-width: 1000px;
}

.select-card {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.select-card:hover {
  background: var(--bg-surface-raised);
  border-color: var(--border-medium);
  transform: translateY(-1px);
}

.select-card--selected {
  border-color: var(--border-strong);
  background: var(--bg-surface-raised);
  box-shadow: var(--shadow-md);
}

.select-card__avatar {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--text-sm);
  color: var(--bg-root);
  flex-shrink: 0;
}

.select-card__name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--text-sm);
}

.select-card__genre {
  font-size: var(--text-xs);
  color: var(--text-muted);
}

/* ===== Compare View ===== */
.compare-screen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}

.compare-screen.active {
  display: flex;
}

.compare-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  position: sticky;
  top: 0;
  z-index: 50;
}

.compare-header__title {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 600;
}

.compare-header__actions {
  display: flex;
  gap: var(--space-2);
}

/* Split Layout */
.compare-split {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.compare-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: var(--space-6);
}

.compare-side--left {
  border-right: 1px solid var(--border-subtle);
}

/* Central timeline ruler */
.compare-ruler {
  width: 60px;
  flex-shrink: 0;
  position: relative;
  background: var(--bg-surface);
  border-left: 1px solid var(--border-subtle);
  border-right: 1px solid var(--border-subtle);
}

.ruler-svg {
  width: 100%;
  height: 100%;
}

/* Artist Header in Compare */
.compare-artist-header {
  text-align: center;
  margin-bottom: var(--space-6);
  padding-bottom: var(--space-5);
  border-bottom: 1px solid var(--border-subtle);
}

.compare-artist-header__avatar {
  width: 72px;
  height: 72px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--bg-root);
  margin: 0 auto var(--space-4);
  box-shadow: 0 0 0 3px var(--bg-root), 0 0 0 5px var(--border-medium);
}

.compare-artist-header__name {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: var(--space-1);
}

.compare-artist-header__meta {
  font-size: var(--text-sm);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
}

.compare-artist-header__genre-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 3px var(--space-3);
  background: rgba(255,255,255,0.05);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 500;
  margin-top: var(--space-2);
}

.compare-artist-header__nationality {
  font-size: var(--text-xs);
  color: var(--text-dim);
  margin-top: var(--space-1);
}

/* Section labels */
.compare-section {
  margin-bottom: var(--space-6);
}

.compare-section__label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-3);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

/* Timeline entries */
.timeline {
  position: relative;
  padding-left: var(--space-5);
}

.timeline::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 4px;
  bottom: 4px;
  width: 1px;
  background: var(--border-medium);
}

.timeline-item {
  position: relative;
  padding-bottom: var(--space-4);
  padding-left: var(--space-3);
}

.timeline-item__dot {
  position: absolute;
  left: calc(-1 * var(--space-5) + 2px);
  top: 6px;
  width: 10px;
  height: 10px;
  border-radius: var(--radius-full);
  border: 2px solid;
  background: var(--bg-root);
}

.timeline-item__year {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 2px;
  font-variant-numeric: tabular-nums;
}

.timeline-item__title {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.timeline-item__type {
  font-size: var(--text-xs);
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

/* Influence list */
.influence-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.influence-chip {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: var(--bg-surface-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  color: var(--text-secondary);
  transition: all var(--transition-fast);
}

.influence-chip--common {
  border-color: var(--genre-jazz);
  background: rgba(212, 168, 67, 0.08);
}

.influence-chip--common::after {
  content: '★';
  color: var(--genre-jazz);
  font-size: 10px;
  margin-left: var(--space-1);
}

/* Awards */
.award-item {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  padding: var(--space-2) 0;
}

.award-item__icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.award-item__text {
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.award-item__year {
  font-size: var(--text-xs);
  color: var(--text-dim);
  margin-top: 1px;
}

/* Overlap highlight */
.overlap-banner {
  text-align: center;
  padding: var(--space-3) var(--space-4);
  background: rgba(212, 168, 67, 0.08);
  border: 1px solid rgba(212, 168, 67, 0.2);
  border-radius: var(--radius-md);
  margin: var(--space-4) var(--space-6);
  font-size: var(--text-sm);
  color: var(--genre-jazz);
}

/* Common connections SVG overlay */
.compare-connections-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

/* Animations */
@keyframes compareSlideInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes compareSlideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.compare-side--left .compare-artist-header,
.compare-side--left .compare-section {
  animation: compareSlideInLeft 500ms var(--ease-out) both;
}

.compare-side--right .compare-artist-header,
.compare-side--right .compare-section {
  animation: compareSlideInRight 500ms var(--ease-out) both;
}

.compare-side .compare-section:nth-child(2) { animation-delay: 80ms; }
.compare-side .compare-section:nth-child(3) { animation-delay: 160ms; }
.compare-side .compare-section:nth-child(4) { animation-delay: 240ms; }
.compare-side .compare-section:nth-child(5) { animation-delay: 320ms; }

/* ===== Mobile ===== */
@media (max-width: 768px) {
  .selection-screen {
    padding: var(--space-4);
  }

  .selection-screen__title {
    font-size: var(--text-2xl);
  }

  .selection-preview {
    flex-direction: column;
    gap: var(--space-2);
  }

  .select-grid {
    grid-template-columns: 1fr 1fr;
  }

  .compare-split {
    flex-direction: column;
  }

  .compare-side--left {
    border-right: none;
    border-bottom: 1px solid var(--border-subtle);
  }

  .compare-ruler {
    display: none;
  }

  .compare-side {
    padding: var(--space-4);
  }

  .compare-header {
    padding: var(--space-3) var(--space-4);
  }
}

@media (max-width: 480px) {
  .select-grid {
    grid-template-columns: 1fr;
  }
}

/* Ruler year labels */
.ruler-year {
  font-family: var(--font-body);
  font-size: 9px;
  fill: var(--text-dim);
  text-anchor: middle;
  font-variant-numeric: tabular-nums;
}

.ruler-line {
  stroke: var(--border-medium);
  stroke-width: 1;
}

.ruler-overlap {
  fill: rgba(212, 168, 67, 0.06);
}

/* Stats row */
.stats-row {
  display: flex;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}

.stat-box {
  flex: 1;
  text-align: center;
  padding: var(--space-3);
  background: var(--bg-surface-raised);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
}

.stat-box__value {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--text-primary);
}

.stat-box__label {
  font-size: var(--text-xs);
  color: var(--text-dim);
  margin-top: 2px;
}
</style>

// ============================================================
// App State
// ============================================================
let selectedArtists = [null, null];

// ============================================================
// Render Selection Grid
// ============================================================
function renderSelectGrid() {
  const grid = document.getElementById('selectGrid');
  const ids = Object.keys(compareData);

  grid.innerHTML = ids.map(id => {
    const a = compareData[id].artist;
    const color = getGenreColor(a.genre);
    return `
      <div class="select-card" data-artist="${id}" tabindex="0" role="button" aria-label="Select ${a.name}">
        <div class="select-card__avatar" style="background:${color}">${getInitials(a.name)}</div>
        <div>
          <div class="select-card__name">${a.name}</div>
          <div class="select-card__genre">${a.genre} · ${a.years}</div>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.select-card').forEach(card => {
    card.addEventListener('click', () => toggleSelection(card.dataset.artist));
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleSelection(card.dataset.artist); }
    });
  });
}

function toggleSelection(id) {
  // If already selected, deselect
  if (selectedArtists[0] === id) { selectedArtists[0] = null; }
  else if (selectedArtists[1] === id) { selectedArtists[1] = null; }
  // Add to next slot
  else if (!selectedArtists[0]) { selectedArtists[0] = id; }
  else if (!selectedArtists[1]) { selectedArtists[1] = id; }
  else {
    // Both full — replace second
    selectedArtists[1] = id;
  }
  updateSelectionUI();
}

function updateSelectionUI() {
  // Update cards
  document.querySelectorAll('.select-card').forEach(card => {
    const isSelected = selectedArtists.includes(card.dataset.artist);
    card.classList.toggle('select-card--selected', isSelected);
  });

  // Update slots
  [0, 1].forEach(i => {
    const slot = document.getElementById(`slot${i + 1}`);
    if (selectedArtists[i]) {
      const a = compareData[selectedArtists[i]].artist;
      const color = getGenreColor(a.genre);
      slot.classList.add('selection-slot--filled');
      slot.innerHTML = `
        <div class="selection-slot__avatar" style="background:${color}">${getInitials(a.name)}</div>
        <div class="selection-slot__name" style="color:${color}">${a.name}</div>
      `;
    } else {
      slot.classList.remove('selection-slot--filled');
      slot.innerHTML = `<span class="selection-slot__placeholder">Select ${i === 0 ? 'first' : 'second'} artist</span>`;
    }
  });

  // Compare button
  const btn = document.getElementById('compareBtn');
  const ready = selectedArtists[0] && selectedArtists[1];
  btn.classList.toggle('compare-btn--active', ready);
}

// ============================================================
// Compare View Rendering
// ============================================================
function showCompare() {
  if (!selectedArtists[0] || !selectedArtists[1]) return;

  document.getElementById('selectionScreen').style.display = 'none';
  document.getElementById('compareScreen').classList.add('active');

  const left = compareData[selectedArtists[0]];
  const right = compareData[selectedArtists[1]];

  document.getElementById('compareTitle').textContent =
    `${left.artist.name} vs ${right.artist.name}`;

  renderSide('sideLeft', left, right);
  renderSide('sideRight', right, left);
  renderRuler(left, right);
  renderOverlapBanner(left, right);
}

function renderSide(containerId, data, otherData) {
  const container = document.getElementById(containerId);
  const color = getGenreColor(data.artist.genre);

  // Find common influences
  const commonBy = data.influences.by.filter(n => otherData.influences.by.includes(n));
  const commonOn = data.influences.on.filter(n => otherData.influences.on.includes(n));

  let html = '';

  // Header
  html += `
    <div class="compare-artist-header">
      <div class="compare-artist-header__avatar" style="background:${color}">${getInitials(data.artist.name)}</div>
      <div class="compare-artist-header__name">${data.artist.name}</div>
      <div class="compare-artist-header__meta">
        <span>${data.artist.years}</span>
      </div>
      <div class="compare-artist-header__genre-badge" style="color:${color}">
        <span class="genre-dot" style="background:${color}"></span>
        ${data.artist.genre}
      </div>
      <div class="compare-artist-header__nationality">${data.artist.nationality}</div>
    </div>
  `;

  // Stats
  html += `
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-box__value">${data.performances.length}</div>
        <div class="stat-box__label">Key Works</div>
      </div>
      <div class="stat-box">
        <div class="stat-box__value">${data.influences.by.length + data.influences.on.length}</div>
        <div class="stat-box__label">Connections</div>
      </div>
      <div class="stat-box">
        <div class="stat-box__value">${data.awards.length}</div>
        <div class="stat-box__label">Awards</div>
      </div>
    </div>
  `;

  // Timeline
  html += `<div class="compare-section">
    <div class="compare-section__label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Key Works
    </div>
    <div class="timeline">`;

  data.performances.sort((a, b) => a.year - b.year).forEach(p => {
    const pColor = getGenreColor(p.genre || data.artist.genre);
    html += `
      <div class="timeline-item">
        <div class="timeline-item__dot" style="border-color:${pColor}"></div>
        <div class="timeline-item__year">${p.year}</div>
        <div class="timeline-item__title">${p.title}</div>
        <div class="timeline-item__type">
          <span class="genre-dot" style="background:${pColor}"></span>
          ${p.genre || data.artist.genre} · ${p.type || 'Album'}
        </div>
      </div>
    `;
  });

  html += `</div></div>`;

  // Influences
  html += `<div class="compare-section">
    <div class="compare-section__label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      Influenced by
    </div>
    <div class="influence-list">`;

  data.influences.by.forEach(name => {
    const isCommon = commonBy.includes(name);
    html += `<div class="influence-chip ${isCommon ? 'influence-chip--common' : ''}">
      ${name}
    </div>`;
  });

  html += `</div></div>`;

  html += `<div class="compare-section">
    <div class="compare-section__label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      Influenced
    </div>
    <div class="influence-list">`;

  data.influences.on.forEach(name => {
    const isCommon = commonOn.includes(name);
    html += `<div class="influence-chip ${isCommon ? 'influence-chip--common' : ''}">
      ${name}
    </div>`;
  });

  html += `</div></div>`;

  // Awards
  html += `<div class="compare-section">
    <div class="compare-section__label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Awards & Achievements
    </div>`;

  data.awards.forEach(award => {
    html += `
      <div class="award-item">
        <div class="award-item__icon">◆</div>
        <div>
          <div class="award-item__text">${award.title}</div>
          <div class="award-item__year">${award.year}</div>
        </div>
      </div>
    `;
  });

  html += `</div>`;

  container.innerHTML = html;
}

// Render Central Timeline Ruler
// ============================================================
function renderRuler(left, right) {
  const rulerEl = document.getElementById('compareRuler');
  const allYears = [
    ...left.performances.map(p => p.year),
    ...right.performances.map(p => p.year),
    left.artist.startYear, left.artist.endYear,
    right.artist.startYear, right.artist.endYear
  ];

  const minYear = Math.min(...allYears);
  const maxYear = Math.max(...allYears);
  const padding = 40;
  const height = Math.max(600, (maxYear - minYear) * 10 + padding * 2);

  rulerEl.style.height = height + 'px';

  const svg = d3.select(rulerEl).html('').append('svg')
    .attr('width', 60)
    .attr('height', height)
    .attr('class', 'ruler-svg');

  const yScale = d3.scaleLinear()
    .domain([minYear, maxYear])
    .range([padding, height - padding]);

  // Overlap region
  const overlapStart = Math.max(left.artist.startYear, right.artist.startYear);
  const overlapEnd = Math.min(
    left.artist.endYear === 2026 ? maxYear : left.artist.endYear,
    right.artist.endYear === 2026 ? maxYear : right.artist.endYear
  );

  if (overlapStart < overlapEnd) {
    svg.append('rect')
      .attr('class', 'ruler-overlap')
      .attr('x', 0)
      .attr('y', yScale(overlapStart))
      .attr('width', 60)
      .attr('height', yScale(overlapEnd) - yScale(overlapStart))
      .attr('rx', 4);
  }

  // Center line
  svg.append('line')
    .attr('class', 'ruler-line')
    .attr('x1', 30).attr('y1', padding)
    .attr('x2', 30).attr('y2', height - padding);

  // Decade ticks
  const startDecade = Math.floor(minYear / 10) * 10;
  const endDecade = Math.ceil(maxYear / 10) * 10;
  for (let y = startDecade; y <= endDecade; y += 10) {
    if (y < minYear || y > maxYear) continue;
    const yPos = yScale(y);

    svg.append('line')
      .attr('x1', 15).attr('y1', yPos)
      .attr('x2', 45).attr('y2', yPos)
      .attr('stroke', 'var(--border-strong)')
      .attr('stroke-width', 1);

    svg.append('text')
      .attr('class', 'ruler-year')
      .attr('x', 30)
      .attr('y', yPos - 6)
      .text(y);
  }

  // Artist activity range bars
  const leftColor = getGenreColor(left.artist.genre);
  const rightColor = getGenreColor(right.artist.genre);

  svg.append('rect')
    .attr('x', 4).attr('y', yScale(left.artist.startYear))
    .attr('width', 4)
    .attr('height', yScale(Math.min(left.artist.endYear, maxYear)) - yScale(left.artist.startYear))
    .attr('fill', leftColor).attr('rx', 2).attr('opacity', 0.5);

  svg.append('rect')
    .attr('x', 52).attr('y', yScale(right.artist.startYear))
    .attr('width', 4)
    .attr('height', yScale(Math.min(right.artist.endYear, maxYear)) - yScale(right.artist.startYear))
    .attr('fill', rightColor).attr('rx', 2).attr('opacity', 0.5);

  // Performance dots on ruler
  left.performances.forEach(p => {
    svg.append('circle')
      .attr('cx', 14).attr('cy', yScale(p.year))
      .attr('r', 3).attr('fill', leftColor);
  });

  right.performances.forEach(p => {
    svg.append('circle')
      .attr('cx', 46).attr('cy', yScale(p.year))
      .attr('r', 3).attr('fill', rightColor);
  });
}

// ============================================================
// Overlap Banner
// ============================================================
function renderOverlapBanner(left, right) {
  const banner = document.getElementById('overlapBanner');
  const overlapStart = Math.max(left.artist.startYear, right.artist.startYear);
  const leftEnd = left.artist.endYear === 2026 ? new Date().getFullYear() : left.artist.endYear;
  const rightEnd = right.artist.endYear === 2026 ? new Date().getFullYear() : right.artist.endYear;
  const overlapEnd = Math.min(leftEnd, rightEnd);

  // Common influences
  const commonBy = left.influences.by.filter(n => right.influences.by.includes(n));
  const commonOn = left.influences.on.filter(n => right.influences.on.includes(n));
  const totalCommon = commonBy.length + commonOn.length;

  let text = '';
  if (overlapStart < overlapEnd) {
    const years = overlapEnd - overlapStart;
    text += `${years} overlapping years (${overlapStart}–${overlapEnd})`;
  }
  if (totalCommon > 0) {
    if (text) text += ' · ';
    text += `${totalCommon} shared connection${totalCommon > 1 ? 's' : ''} (★ marked)`;
  }

  if (text) {
    banner.innerHTML = `<div class="overlap-banner">${text}</div>`;
  } else {
    banner.innerHTML = '';
  }
}

// ============================================================
// Swap
// ============================================================
function swapArtists() {
  selectedArtists = [selectedArtists[1], selectedArtists[0]];
  const left = compareData[selectedArtists[0]];
  const right = compareData[selectedArtists[1]];

  document.getElementById('compareTitle').textContent =
    `${left.artist.name} vs ${right.artist.name}`;

  renderSide('sideLeft', left, right);
  renderSide('sideRight', right, left);
  renderRuler(left, right);
  renderOverlapBanner(left, right);
}

function backToSelection() {
  document.getElementById('selectionScreen').style.display = '';
  document.getElementById('compareScreen').classList.remove('active');
  selectedArtists = [null, null];
  updateSelectionUI();
}

// ============================================================
// Event Listeners
// ============================================================
document.getElementById('compareBtn').addEventListener('click', showCompare);
document.getElementById('swapBtn').addEventListener('click', swapArtists);
document.getElementById('backToSelectBtn').addEventListener('click', backToSelection);

// ============================================================
// Init
// ============================================================
renderSelectGrid();

// Pre-select a compelling pair for demo
selectedArtists = ['jimi-hendrix', 'prince'];
updateSelectionUI();
</script>
